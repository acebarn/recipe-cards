# nginx-Server-Block für recipes.alessiobisgen.de
# Ablage auf dem Server: /etc/nginx/sites-available/recipes.conf
#   ln -s ../sites-available/recipes.conf /etc/nginx/sites-enabled/recipes.conf
#   nginx -t && systemctl reload nginx
#
# TLS via Cloudflare Origin-Cert (Cloudflare-Proxy bleibt an, SSL-Modus „Full (strict)").
# Cert/Key ablegen unter /etc/ssl/cf-origin/recipes.{pem,key} (chmod 600 key).

server {
    listen 80;
    listen [::]:80;
    server_name recipes.alessiobisgen.de;
    # Cloudflare terminiert HTTPS an der Edge; reine HTTP-Origin-Zugriffe auf 443 umlenken.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name recipes.alessiobisgen.de;

    ssl_certificate     /etc/ssl/cf-origin/recipes.pem;
    ssl_certificate_key /etc/ssl/cf-origin/recipes.key;

    client_max_body_size 25m; # Foto-Uploads (mehrseitige Rezepte)

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
